{% extends 'base.html' %}

{% block content %}

<h2>Job Tracker</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="company" placeholder="Company" class="form-control">

<br>

<input type="text" name="role" placeholder="Role" class="form-control">

<br>

<select name="status" class="form-control">

<option>Applied</option>
<option>Interview</option>
<option>Rejected</option>
<option>Offer</option>

</select>

<br>

<button class="btn btn-success">Add Job</button>

</form>


<h4 class="mt-4">Applications</h4>

<ul>

{% for job in jobs %}

<li>{{job.company}} - {{job.role}} - {{job.status}}</li>

{% endfor %}

</ul>

{% endblock %}
